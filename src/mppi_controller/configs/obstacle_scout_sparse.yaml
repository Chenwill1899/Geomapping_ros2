# Geomapping navigation obstacle override.
# Keeps the obstacle count unchanged, spreads them over a wider area,
# and slightly increases each obstacle footprint.
random_seed: 13
dynamic: false
collision_enabled: true
debug: false
mode: 2d
radius: 0.34
box_size: 0.34
range:
  x_min: 0.5
  x_max: 22.5
  y_min: -6.0
  y_max: 6.0
  z_min: 0.0
  z_max: 1.5
obstacle_count: 20
min_speed: 0.0
max_speed: 0.3
update_threads: 0
parallel_threshold: 16
publish:
  enabled: true
  topic: /dyn_obstacle
  frame_id: scout1/odom
  rate_hz: 20.0
